<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="neonLiquid" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .flask-outline {
      fill: none;
      stroke: #ffffff;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.95;
      filter: drop-shadow(0px 0px 3px rgba(255, 255, 255, 0.5));
    }
    
    .liquid {
      fill: url(#neonLiquid);
      opacity: 0.85;
      filter: url(#neonGlow);
    }

    .bubble {
      fill: #00f2fe;
      opacity: 0;
      filter: url(#neonGlow);
      transform-box: fill-box;
      transform-origin: center;
    }

    .bubble-1 {
      animation: floatUp1 3s infinite linear;
    }
    
    .bubble-2 {
      animation: floatUp2 2.4s infinite linear 0.8s;
    }
    
    .bubble-3 {
      animation: floatUp3 3.6s infinite linear 1.6s;
    }

    @keyframes floatUp1 {
      0% {
        transform: translateY(0px) scale(0.3);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      90% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-40px) translateX(-6px) scale(1.1);
        opacity: 0;
      }
    }

    @keyframes floatUp2 {
      0% {
        transform: translateY(0px) scale(0.3);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      90% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-45px) translateX(6px) scale(1);
        opacity: 0;
      }
    }

    @keyframes floatUp3 {
      0% {
        transform: translateY(0px) scale(0.3);
        opacity: 0;
      }
      10% {
        opacity: 0.9;
      }
      90% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-35px) translateX(-2px) scale(1.2);
        opacity: 0;
      }
    }

    /* Wave effect on liquid */
    .liquid-surface {
      animation: wave 4s ease-in-out infinite alternate;
      transform-box: fill-box;
      transform-origin: center;
    }

    @keyframes wave {
      0% {
        transform: rotate(-1.5deg) translateY(0.5px);
      }
      100% {
        transform: rotate(1.5deg) translateY(-0.5px);
      }
    }
  </style>

  <!-- Background for dark/light theme visibility -->
  <rect width="100" height="100" rx="16" fill="#1e1e24" />

  <!-- Liquid base and body -->
  <path class="liquid liquid-surface" d="M 33 60 C 40 58, 60 62, 67 60 L 76 83 C 78 87, 75 90, 70 90 L 30 90 C 25 90, 22 87, 24 83 Z" />

  <!-- Flask outline -->
  <path class="flask-outline" d="M 42 20 L 58 20 M 45 20 L 45 45 L 24 83 C 21 88, 25 91, 30 91 L 70 91 C 75 91, 79 88, 76 83 L 55 45 L 55 20" />

  <!-- Bubbles floating up from the liquid -->
  <circle class="bubble bubble-1" cx="42" cy="78" r="3" />
  <circle class="bubble bubble-2" cx="58" cy="82" r="2.5" />
  <circle class="bubble bubble-3" cx="50" cy="75" r="3.5" />
  <circle class="bubble bubble-1" cx="35" cy="80" r="2" />
  <circle class="bubble bubble-2" cx="65" cy="79" r="2.8" />
</svg>